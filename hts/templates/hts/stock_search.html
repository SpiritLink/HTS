<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>주식 이름 검색 - HTS</title>
    <!-- Chart.js 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px 10px; }
        .container { width: 100%; max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { margin-top: 0; font-size: 22px; color: #111; letter-spacing: -0.5px; border-bottom: 2px solid #111; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        .btn-secondary { background-color: #fff; color: #495057; border: 1px solid #ced4da; padding: 6px 12px; border-radius: 6px; font-size: 13px; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
        .btn-secondary:hover { background-color: #f1f3f5; color: #111; }

        .btn-primary { background-color: #004ea2; color: #fff; border: 1px solid #004ea2; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { background-color: #003a79; }
        .btn-primary:disabled { background-color: #adb5bd; border-color: #adb5bd; cursor: not-allowed; }

        .search-container { position: relative; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 14px; font-size: 16px; border: 2px solid #004ea2; border-radius: 8px; box-sizing: border-box; outline: none; }
        .search-input:focus { box-shadow: 0 0 0 3px rgba(0, 78, 162, 0.2); }

        /* 자동완성 드롭다운 스타일 */
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #ccc; border-top: none; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000; max-height: 250px; overflow-y: auto; display: none; margin: 0; padding: 0; list-style-type: none; }
        .autocomplete-list li { padding: 12px 14px; cursor: pointer; border-bottom: 1px solid #f1f3f5; display: flex; align-items: center; font-size: 14px; word-break: keep-all; }
        .autocomplete-list li:last-child { border-bottom: none; }
        .autocomplete-list li:hover { background-color: #f8f9fa; }

        /* 날짜 선택 영역 스타일 */
        .date-filter-container {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        .date-filter-container.active { display: block; }
        .date-filter-label {
            font-size: 13px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 10px;
            display: block;
        }
        .date-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .date-input-wrapper {
            flex: 1;
            min-width: 130px;
        }
        .date-input-wrapper label {
            display: block;
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 4px;
        }
        .date-input {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }
        .date-input:focus { border-color: #004ea2; box-shadow: 0 0 0 2px rgba(0, 78, 162, 0.15); }
        .date-separator {
            color: #6c757d;
            font-size: 14px;
            padding: 20px 0 0 0;
        }
        .date-presets {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .preset-btn {
            background-color: #fff;
            color: #495057;
            border: 1px solid #ced4da;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            background-color: #004ea2;
            color: #fff;
            border-color: #004ea2;
        }

        /* 선택된 종목 정보 */
        .selected-stock-info {
            background-color: #e9f2ff;
            border: 1px solid #004ea2;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }
        .selected-stock-info.active { display: flex; }
        .selected-stock-name {
            font-weight: 600;
            color: #004ea2;
            font-size: 15px;
        }
        .selected-stock-symbol {
            font-size: 13px;
            color: #6c757d;
        }
        .change-stock-btn {
            background: none;
            border: none;
            color: #004ea2;
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
        }

        /* 선택된 결과 표시 영역 */
        .result-card { background-color: #fff; border: 1px solid #e9ecef; border-radius: 8px; padding: 20px; display: none; margin-top: 15px; box-sizing: border-box; }
        .result-header { text-align: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #e9ecef; }
        .result-header h2 { margin: 0 0 8px 0; color: #004ea2; font-size: 22px; word-break: keep-all; }
        .result-header p { margin: 0; color: #555; font-size: 14px; }
        .market-badge { background-color: #e9ecef; color: #495057; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-right: 8px; display: inline-block; vertical-align: middle; }

        .chart-container { position: relative; height: 250px; width: 100%; margin-top: 15px; }
        .loader { text-align: center; color: #666; font-size: 13px; margin-top: 20px; display: none; }

        /* 미디어 쿼리 - 모바일 화면 대응 */
        @media (max-width: 480px) {
            h1 { font-size: 18px; }
            .btn-secondary { font-size: 12px; padding: 5px 10px; }
            .search-input { font-size: 15px; padding: 12px; }
            .result-header h2 { font-size: 18px; }
            .date-inputs { flex-direction: column; align-items: stretch; }
            .date-separator { text-align: center; padding: 5px 0; }
            .date-input-wrapper { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>주식 이름으로 검색</span>
            <a href="{% url 'hts:info_lookup' %}" class="btn-secondary">뒤로가기</a>
        </h1>

        <!-- 종목 검색 -->
        <div class="search-container" id="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="종목명을 입력하세요 (예: 삼성전자)" autocomplete="off">
            <ul id="autocomplete-list" class="autocomplete-list"></ul>
        </div>

        <!-- 선택된 종목 표시 -->
        <div id="selected-stock-info" class="selected-stock-info">
            <div>
                <span id="selected-stock-name" class="selected-stock-name"></span>
                <span id="selected-stock-symbol" class="selected-stock-symbol"></span>
            </div>
            <button class="change-stock-btn" onclick="changeStock()">종목 변경</button>
        </div>

        <!-- 날짜 선택 영역 -->
        <div id="date-filter-container" class="date-filter-container">
            <span class="date-filter-label">📅 조회 기간 선택</span>
            <div class="date-inputs">
                <div class="date-input-wrapper">
                    <label for="start-date">시작일</label>
                    <input type="date" id="start-date" class="date-input">
                </div>
                <span class="date-separator">~</span>
                <div class="date-input-wrapper">
                    <label for="end-date">종료일</label>
                    <input type="date" id="end-date" class="date-input">
                </div>
            </div>
            <div class="date-presets">
                <button class="preset-btn" onclick="setPresetDate(7)">1주일</button>
                <button class="preset-btn" onclick="setPresetDate(30)">1개월</button>
                <button class="preset-btn" onclick="setPresetDate(90)">3개월</button>
                <button class="preset-btn" onclick="setPresetDate(180)">6개월</button>
                <button class="preset-btn" onclick="setPresetDate(365)">1년</button>
            </div>
            <button id="search-btn" class="btn-primary" style="width: 100%; margin-top: 15px;" onclick="searchWithDateRange()">
                조회하기
            </button>
        </div>

        <div id="result-card" class="result-card">
            <div class="result-header">
                <span id="result-market" class="market-badge"></span>
                <h2 id="result-name"></h2>
                <p>종목 심볼: <strong id="result-symbol"></strong></p>
            </div>

            <h3 style="font-size: 15px; margin-bottom: 10px; text-align: center; color: #333;">
                <span id="chart-period-label">최근 1달 주가 추이</span>
            </h3>
            <div id="chart-loader" class="loader">주가 데이터를 불러오는 중입니다...</div>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const autocompleteList = document.getElementById('autocomplete-list');
        const resultCard = document.getElementById('result-card');
        const chartLoader = document.getElementById('chart-loader');
        const dateFilterContainer = document.getElementById('date-filter-container');
        const selectedStockInfo = document.getElementById('selected-stock-info');
        const searchContainer = document.getElementById('search-container');

        let debounceTimer;
        let priceChartInstance = null;
        let currentStock = null;

        // 페이지 로드 시 기본 날짜 설정 (최근 1달)
        function initDefaultDates() {
            const endDate = new Date();
            const startDate = new Date();
            startDate.setMonth(startDate.getMonth() - 1);

            document.getElementById('end-date').value = endDate.toISOString().split('T')[0];
            document.getElementById('start-date').value = startDate.toISOString().split('T')[0];
        }

        // 프리셋 버튼 클릭 시 날짜 설정
        function setPresetDate(days) {
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(startDate.getDate() - days);

            document.getElementById('end-date').value = endDate.toISOString().split('T')[0];
            document.getElementById('start-date').value = startDate.toISOString().split('T')[0];
        }

        // 종목 변경
        function changeStock() {
            currentStock = null;
            selectedStockInfo.classList.remove('active');
            dateFilterContainer.classList.remove('active');
            resultCard.style.display = 'none';
            searchContainer.style.display = 'block';
            searchInput.value = '';
            searchInput.focus();
        }

        // 검색 입력 이벤트
        searchInput.addEventListener('input', function() {
            const query = this.value.trim();

            clearTimeout(debounceTimer);

            if (!query) {
                autocompleteList.style.display = 'none';
                return;
            }

            debounceTimer = setTimeout(() => {
                fetch(`/hts/search_stocks/?q=${encodeURIComponent(query)}`)
                    .then(response => response.json())
                    .then(data => {
                        autocompleteList.innerHTML = '';

                        if (data.results && data.results.length > 0) {
                            data.results.forEach(stock => {
                                const li = document.createElement('li');
                                li.innerHTML = `
                                    <span class="market-badge">${stock.market}</span>
                                    <span><strong>${stock.name}</strong> <span style="color:#6c757d; font-size:12px;">(${stock.symbol})</span></span>
                                `;

                                li.addEventListener('click', function() {
                                    selectStock(stock);
                                });

                                autocompleteList.appendChild(li);
                            });
                            autocompleteList.style.display = 'block';
                        } else {
                            const li = document.createElement('li');
                            li.innerHTML = '<span style="color: #777;">검색 결과가 없습니다.</span>';
                            autocompleteList.appendChild(li);
                            autocompleteList.style.display = 'block';
                        }
                    })
                    .catch(error => console.error('Error fetching search results:', error));
            }, 300);
        });

        // 종목 선택
        function selectStock(stock) {
            currentStock = stock;
            searchInput.value = stock.name;
            autocompleteList.style.display = 'none';

            // 검색창 숨기고 선택된 종목 표시
            searchContainer.style.display = 'none';
            document.getElementById('selected-stock-name').textContent = stock.name;
            document.getElementById('selected-stock-symbol').textContent = `(${stock.symbol})`;
            selectedStockInfo.classList.add('active');

            // 날짜 선택 영역 표시
            dateFilterContainer.classList.add('active');

            // 기본 날짜로 바로 조회
            initDefaultDates();
            searchWithDateRange();
        }

        // 날짜 범위로 조회
        function searchWithDateRange() {
            if (!currentStock) return;

            const startDateStr = document.getElementById('start-date').value;
            const endDateStr = document.getElementById('end-date').value;

            if (!startDateStr || !endDateStr) {
                alert('시작일과 종료일을 모두 선택해주세요.');
                return;
            }

            if (new Date(startDateStr) > new Date(endDateStr)) {
                alert('시작일은 종료일보다 이전이어야 합니다.');
                return;
            }

            // 차트 기간 라벨 업데이트
            const start = new Date(startDateStr);
            const end = new Date(endDateStr);
            const diffDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
            document.getElementById('chart-period-label').textContent = 
                `${startDateStr} ~ ${endDateStr} (${diffDays}일)`;

            showResult(currentStock, startDateStr, endDateStr);
        }

        // 검색 결과 카드 표시 및 차트 데이터 로드
        function showResult(stock, startDateStr, endDateStr) {
            document.getElementById('result-market').textContent = stock.market;
            document.getElementById('result-name').textContent = stock.name;
            document.getElementById('result-symbol').textContent = stock.symbol;

            resultCard.style.display = 'block';

            if (priceChartInstance) {
                priceChartInstance.destroy();
            }

            chartLoader.style.display = 'block';
            chartLoader.innerHTML = '<div>주가 데이터를 불러오는 중입니다...</div>';
            document.getElementById('priceChart').style.display = 'none';

            // API 호출
            fetch(`/api/prices/symbol/range/?symbol=${encodeURIComponent(stock.symbol)}&start_date=${encodeURIComponent(startDateStr)}&end_date=${encodeURIComponent(endDateStr)}`)
                .then(response => response.json())
                .then(data => {
                    if ((data.status === 'success' || data.status === 'partial') && data.data && data.data.length > 0) {
                        chartLoader.style.display = 'none';
                        document.getElementById('priceChart').style.display = 'block';
                        const sortedData = data.data.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                        renderChart(sortedData, stock.name);
                        
                        // 누락된 데이터가 있는 경우 알림 표시
                        if (data.status === 'partial' && data.missing_data) {
                            const missingMsg = document.createElement('div');
                            missingMsg.id = 'missing-data-notice';
                            missingMsg.style.cssText = 'margin-top: 15px; padding: 12px; background-color: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; font-size: 13px; color: #856404;';
                            missingMsg.innerHTML = `
                                <strong>⚠️ 일부 데이터 누락</strong><br>
                                ${data.missing_data.message}<br>
                                <small>누락된 기간의 데이터는 백그라운드에서 자동으로 가져오고 있습니다. 잠시 후 다시 조회하시면 완전한 데이터를 확인하실 수 있습니다.</small>
                            `;
                            // 기존 알림이 있으면 제거
                            const existingNotice = document.getElementById('missing-data-notice');
                            if (existingNotice) existingNotice.remove();
                            resultCard.appendChild(missingMsg);
                        }
                    } else if (data.status === 'pending') {
                        document.getElementById('priceChart').style.display = 'none';
                        chartLoader.style.display = 'block';
                        chartLoader.innerHTML = `
                            <div style="color: #004ea2; font-weight: bold; margin-bottom: 8px;">
                                ⏳ 데이터 적재 중
                            </div>
                            <div style="font-size: 13px; color: #666;">
                                ${data.message}<br>
                                <small>잠시 후 다시 조회해 주세요.</small>
                            </div>
                        `;
                    } else if (data.status === 'accepted') {
                        document.getElementById('priceChart').style.display = 'none';
                        chartLoader.style.display = 'block';
                        chartLoader.innerHTML = `
                            <div style="color: #28a745; font-weight: bold; margin-bottom: 8px;">
                                ✅ 데이터 요청 완료
                            </div>
                            <div style="font-size: 13px; color: #666;">
                                ${data.message}<br>
                                <small>주가 정보를 가져오는 중입니다. 잠시 후 다시 조회해 주세요.</small>
                            </div>
                        `;
                    } else {
                        renderChart([], stock.name);
                        chartLoader.style.display = 'block';
                        chartLoader.textContent = "해당 기간의 주가 데이터가 없습니다.";
                    }
                })
                .catch(error => {
                    console.error('Error fetching price data:', error);
                    document.getElementById('priceChart').style.display = 'none';
                    chartLoader.style.display = 'block';
                    chartLoader.innerHTML = `
                        <div style="color: #dc3545; font-weight: bold; margin-bottom: 8px;">
                            ❌ 오류 발생
                        </div>
                        <div style="font-size: 13px; color: #666;">
                            주가 데이터를 불러오는 중 오류가 발생했습니다.<br>
                            <small>나중에 다시 시도해 주세요.</small>
                        </div>
                    `;
                });
        }

        // Chart.js 렌더링 함수
        function renderChart(priceData, stockName) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            const labels = priceData.map(item => {
                const date = new Date(item.timestamp);
                return `${date.getMonth() + 1}/${date.getDate()}`;
            });

            const colors = priceData.map(item => {
                return item.close_price >= item.open_price ? 'rgba(239, 68, 68, 0.8)' : 'rgba(59, 130, 246, 0.8)';
            });

            const barData = priceData.map(item => {
                const low = item.low_price !== null ? item.low_price : item.close_price;
                const high = item.high_price !== null ? item.high_price : item.close_price;
                return [low, high];
            });

            const closePrices = priceData.map(item => item.close_price);

            priceChartInstance = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: 'bar',
                            label: '최저가 ~ 최고가',
                            data: barData,
                            backgroundColor: colors,
                            borderColor: colors,
                            borderWidth: 1,
                            barPercentage: 0.6,
                            categoryPercentage: 0.8
                        },
                        {
                            type: 'line',
                            label: '종가 (Close Price)',
                            data: closePrices,
                            borderColor: '#343a40',
                            borderWidth: 2,
                            pointRadius: 2,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#343a40',
                            fill: false,
                            tension: 0.1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'bottom',
                            labels: {
                                boxWidth: 12,
                                font: { size: 11 }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    if (context.datasetIndex === 0) {
                                        const low = context.raw[0].toLocaleString();
                                        const high = context.raw[1].toLocaleString();
                                        return `범위: ${low} ~ ${high}원`;
                                    }
                                    return `종가: ${context.raw.toLocaleString()}원`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { font: { size: 10 }, maxTicksLimit: 8 }
                        },
                        y: {
                            beginAtZero: false,
                            ticks: {
                                font: { size: 10 },
                                callback: function(value) {
                                    return value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        // 입력창 밖을 클릭하면 자동완성 목록 숨기기
        document.addEventListener('click', function(e) {
            if (e.target !== searchInput && e.target !== autocompleteList) {
                autocompleteList.style.display = 'none';
            }
        });

        // 초기화
        initDefaultDates();
    </script>
</body>
</html>
