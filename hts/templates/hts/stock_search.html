<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>주식 이름 검색 - HTS</title>
    <!-- Chart.js 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px 10px; }
        .container { width: 100%; max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { margin-top: 0; font-size: 22px; color: #111; letter-spacing: -0.5px; border-bottom: 2px solid #111; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        .btn-secondary { background-color: #fff; color: #495057; border: 1px solid #ced4da; padding: 6px 12px; border-radius: 6px; font-size: 13px; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
        .btn-secondary:hover { background-color: #f1f3f5; color: #111; }

        .search-container { position: relative; margin-bottom: 30px; }
        .search-input { width: 100%; padding: 14px; font-size: 16px; border: 2px solid #004ea2; border-radius: 8px; box-sizing: border-box; outline: none; }
        .search-input:focus { box-shadow: 0 0 0 3px rgba(0, 78, 162, 0.2); }

        /* 자동완성 드롭다운 스타일 */
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #ccc; border-top: none; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000; max-height: 250px; overflow-y: auto; display: none; margin: 0; padding: 0; list-style-type: none; }
        .autocomplete-list li { padding: 12px 14px; cursor: pointer; border-bottom: 1px solid #f1f3f5; display: flex; align-items: center; font-size: 14px; word-break: keep-all; }
        .autocomplete-list li:last-child { border-bottom: none; }
        .autocomplete-list li:hover { background-color: #f8f9fa; }

        /* 선택된 결과 표시 영역 */
        .result-card { background-color: #fff; border: 1px solid #e9ecef; border-radius: 8px; padding: 20px; display: none; margin-top: 15px; box-sizing: border-box; }
        .result-header { text-align: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #e9ecef; }
        .result-header h2 { margin: 0 0 8px 0; color: #004ea2; font-size: 22px; word-break: keep-all; }
        .result-header p { margin: 0; color: #555; font-size: 14px; }
        .market-badge { background-color: #e9ecef; color: #495057; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-right: 8px; display: inline-block; vertical-align: middle; }

        .chart-container { position: relative; height: 250px; width: 100%; margin-top: 15px; }
        .loader { text-align: center; color: #666; font-size: 13px; margin-top: 20px; display: none; }

        /* 미디어 쿼리 - 모바일 화면 대응 */
        @media (max-width: 480px) {
            h1 { font-size: 18px; }
            .btn-secondary { font-size: 12px; padding: 5px 10px; }
            .search-input { font-size: 15px; padding: 12px; }
            .result-header h2 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>주식 이름으로 검색</span>
            <a href="{% url 'hts:info_lookup' %}" class="btn-secondary">뒤로가기</a>
        </h1>

        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="종목명을 입력하세요 (예: 삼성전자)" autocomplete="off">
            <ul id="autocomplete-list" class="autocomplete-list"></ul>
        </div>

        <div id="result-card" class="result-card">
            <div class="result-header">
                <span id="result-market" class="market-badge"></span>
                <h2 id="result-name"></h2>
                <p>종목 심볼: <strong id="result-symbol"></strong></p>
            </div>

            <h3 style="font-size: 15px; margin-bottom: 10px; text-align: center; color: #333;">최근 1달 주가 추이 (최고/최저가)</h3>
            <div id="chart-loader" class="loader">주가 데이터를 불러오는 중입니다...</div>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const autocompleteList = document.getElementById('autocomplete-list');
        const resultCard = document.getElementById('result-card');
        const chartLoader = document.getElementById('chart-loader');

        let debounceTimer;
        let priceChartInstance = null; // 차트 인스턴스 저장용

        searchInput.addEventListener('input', function() {
            const query = this.value.trim();

            clearTimeout(debounceTimer);

            if (!query) {
                autocompleteList.style.display = 'none';
                return;
            }

            // 사용자가 입력을 멈추고 300ms 후에 API 요청 (Debouncing)
            debounceTimer = setTimeout(() => {
                fetch(`/hts/search_stocks/?q=${encodeURIComponent(query)}`)
                    .then(response => response.json())
                    .then(data => {
                        autocompleteList.innerHTML = '';

                        if (data.results && data.results.length > 0) {
                            data.results.forEach(stock => {
                                const li = document.createElement('li');
                                li.innerHTML = `
                                    <span class="market-badge">${stock.market}</span>
                                    <span><strong>${stock.name}</strong> <span style="color:#6c757d; font-size:12px;">(${stock.symbol})</span></span>
                                `;

                                // 리스트 아이템 클릭 시 이벤트
                                li.addEventListener('click', function() {
                                    searchInput.value = stock.name;
                                    autocompleteList.style.display = 'none';
                                    showResult(stock);
                                });

                                autocompleteList.appendChild(li);
                            });
                            autocompleteList.style.display = 'block';
                        } else {
                            const li = document.createElement('li');
                            li.innerHTML = '<span style="color: #777;">검색 결과가 없습니다.</span>';
                            autocompleteList.appendChild(li);
                            autocompleteList.style.display = 'block';
                        }
                    })
                    .catch(error => console.error('Error fetching search results:', error));
            }, 300);
        });

        // 검색 결과 카드 표시 및 차트 데이터 로드 함수
        function showResult(stock) {
            // 헤더 정보 업데이트
            document.getElementById('result-market').textContent = stock.market;
            document.getElementById('result-name').textContent = stock.name;
            document.getElementById('result-symbol').textContent = stock.symbol;

            resultCard.style.display = 'block';

            // 기존 차트가 있다면 파괴
            if (priceChartInstance) {
                priceChartInstance.destroy();
            }

            // 날짜 계산 (현재부터 1달 전)
            const endDate = new Date();
            const startDate = new Date();
            startDate.setMonth(startDate.getMonth() - 1);

            const endIsoStr = endDate.toISOString();
            const startIsoStr = startDate.toISOString();

            chartLoader.style.display = 'block';
            document.getElementById('priceChart').style.display = 'none';

            // api/prices/symbol/range/ 엔드포인트 호출
            fetch(`/api/prices/symbol/range/?symbol=${encodeURIComponent(stock.symbol)}&start_time=${encodeURIComponent(startIsoStr)}&end_time=${encodeURIComponent(endIsoStr)}`)
                .then(response => response.json())
                .then(data => {
                    chartLoader.style.display = 'none';
                    document.getElementById('priceChart').style.display = 'block';

                    if (data.status === 'success' && data.data && data.data.length > 0) {
                        // 시간순으로 정렬 (오래된 날짜가 먼저 오도록)
                        const sortedData = data.data.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

                        renderChart(sortedData, stock.name);
                    } else {
                        // 데이터가 없을 경우 빈 차트 렌더링
                        renderChart([], stock.name);
                        chartLoader.style.display = 'block';
                        chartLoader.textContent = "최근 1달간의 주가 데이터가 없습니다.";
                    }
                })
                .catch(error => {
                    console.error('Error fetching price data:', error);
                    chartLoader.style.display = 'block';
                    chartLoader.textContent = "주가 데이터를 불러오는 중 오류가 발생했습니다.";
                });
        }

        // Chart.js를 이용한 봉 차트(Bar Chart 모방) 렌더링 함수
        function renderChart(priceData, stockName) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            const labels = priceData.map(item => {
                const date = new Date(item.timestamp);
                return `${date.getMonth() + 1}/${date.getDate()}`; // MM/DD 형식
            });

            // 한국 주식 시장 기준: 종가 >= 시가 이면 빨간색(상승), 종가 < 시가 이면 파란색(하락)
            const colors = priceData.map(item => {
                return item.close_price >= item.open_price ? 'rgba(239, 68, 68, 0.8)' : 'rgba(59, 130, 246, 0.8)';
            });

            // Floating Bar Chart 데이터 포맷: [최저가, 최고가]
            const barData = priceData.map(item => {
                // high_price와 low_price가 없으면 close_price로 대체하여 에러 방지
                const low = item.low_price !== null ? item.low_price : item.close_price;
                const high = item.high_price !== null ? item.high_price : item.close_price;
                return [low, high];
            });

            // 종가 데이터를 연결하는 선(Line) 추가 (추세 파악 용도)
            const closePrices = priceData.map(item => item.close_price);

            priceChartInstance = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: 'bar',
                            label: '최저가 ~ 최고가',
                            data: barData,
                            backgroundColor: colors,
                            borderColor: colors,
                            borderWidth: 1,
                            barPercentage: 0.6,
                            categoryPercentage: 0.8
                        },
                        {
                            type: 'line',
                            label: '종가 (Close Price)',
                            data: closePrices,
                            borderColor: '#343a40',
                            borderWidth: 2,
                            pointRadius: 2, // 모바일 고려 점 크기 축소
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#343a40',
                            fill: false,
                            tension: 0.1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'bottom',
                            labels: {
                                boxWidth: 12,
                                font: { size: 11 }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    // Bar 차트 툴팁 (context.datasetIndex === 0)
                                    if (context.datasetIndex === 0) {
                                        const low = context.raw[0].toLocaleString();
                                        const high = context.raw[1].toLocaleString();
                                        return `범위: ${low} ~ ${high}원`; // 모바일 텍스트 길이 축소
                                    }
                                    // Line 차트 툴팁 (context.datasetIndex === 1)
                                    return `종가: ${context.raw.toLocaleString()}원`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: { font: { size: 10 }, maxTicksLimit: 8 } // x축 라벨 겹침 방지
                        },
                        y: {
                            beginAtZero: false,
                            ticks: {
                                font: { size: 10 },
                                callback: function(value) {
                                    return value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        // 입력창 밖을 클릭하면 자동완성 목록 숨기기
        document.addEventListener('click', function(e) {
            if (e.target !== searchInput && e.target !== autocompleteList) {
                autocompleteList.style.display = 'none';
            }
        });
    </script>
</body>
</html>
