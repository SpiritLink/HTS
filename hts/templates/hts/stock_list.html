<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>종목 전체 조회 - HTS</title>
    <!-- Chart.js 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px 10px; }
        .container { width: 100%; max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; overflow: hidden; }
        h1 { margin-top: 0; font-size: 22px; color: #111; letter-spacing: -0.5px; border-bottom: 2px solid #111; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        .btn-secondary { background-color: #fff; color: #495057; border: 1px solid #ced4da; padding: 6px 12px; border-radius: 6px; font-size: 13px; text-decoration: none; transition: all 0.2s; cursor: pointer; white-space: nowrap; }
        .btn-secondary:hover:not(:disabled) { background-color: #f1f3f5; color: #111; }
        .btn-secondary:disabled { background-color: #e9ecef; color: #adb5bd; cursor: not-allowed; border-color: #dee2e6; }
        
        .btn-primary { background-color: #004ea2; color: #fff; border: 1px solid #004ea2; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { background-color: #003a79; }

        /* 날짜 선택 영역 스타일 */
        .date-filter-container {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .date-filter-label {
            font-size: 13px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 10px;
            display: block;
        }
        .date-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .date-input-wrapper {
            flex: 1;
            min-width: 130px;
        }
        .date-input-wrapper label {
            display: block;
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 4px;
        }
        .date-input {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }
        .date-input:focus { border-color: #004ea2; box-shadow: 0 0 0 2px rgba(0, 78, 162, 0.15); }
        .date-separator {
            color: #6c757d;
            font-size: 14px;
            padding: 20px 0 0 0;
        }
        .date-presets {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .preset-btn {
            background-color: #fff;
            color: #495057;
            border: 1px solid #ced4da;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            background-color: #004ea2;
            color: #fff;
            border-color: #004ea2;
        }

        /* 테이블 래퍼 (가로 스크롤 허용) */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 20px; }

        .table-krds { width: 100%; min-width: 400px; border-collapse: collapse; text-align: center; display: none; }
        .table-krds.active { display: table; }
        .table-krds th, .table-krds td { padding: 12px 8px; border-bottom: 1px solid #dee2e6; font-size: 14px; word-break: keep-all; }
        .table-krds th { background-color: #f8f9fa; font-weight: 600; color: #111; border-top: 2px solid #495057; border-bottom: 2px solid #dee2e6; white-space: nowrap; }

        /* 테이블 행 클릭 스타일 적용 */
        .table-krds tbody tr { cursor: pointer; transition: background-color 0.2s; }
        .table-krds tbody tr:hover { background-color: #f1f3f5; }

        /* 열 너비 조절 및 스타일 */
        .table-krds th:first-child, .table-krds td:first-child { width: 15%; color: #6c757d; font-weight: normal; }
        .table-krds td:nth-child(2) { font-weight: 600; color: #111; }

        /* 시장별 배지 스타일 */
        .market-badge-kospi { background-color: #dc3545; color: #fff; }
        .market-badge-kosdaq { background-color: #0066ff; color: #fff; }
        .market-badge-nasdaq { background-color: #6f42c1; color: #fff; }
        .market-badge-us { background-color: #6c757d; color: #fff; }
        .market-badge-default { background-color: #e9ecef; color: #495057; }
        .table-krds td:nth-child(3) { text-align: left; }

        .empty-msg { text-align: center; padding: 40px 20px; color: #777; background: #f8f9fa; border-radius: 8px; border: 1px dashed #ccc; margin-top: 20px; display: none; font-size: 14px; }
        .loader { text-align: center; padding: 30px; color: #666; font-size: 14px; }

        /* Pagination 스타일 */
        .pagination { display: flex; justify-content: center; align-items: center; margin-top: 25px; gap: 10px; display: none; }
        .pagination.active { display: flex; }
        .page-info { font-size: 14px; color: #495057; font-weight: bold; }

        /* 모달 (차트 팝업) 스타일 - 네이버 금융 스타일 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #fff; width: 100%; max-width: 900px; max-height: 95vh; border-radius: 0; padding: 0; box-sizing: border-box; box-shadow: 0 10px 40px rgba(0,0,0,0.3); position: relative; display: flex; flex-direction: column; overflow-y: auto; }
        .modal-close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.9); border: none; font-size: 24px; line-height: 1; cursor: pointer; color: #333; transition: all 0.2s; padding: 8px 12px; border-radius: 4px; z-index: 10; }
        .modal-close-btn:hover { background: #fff; color: #000; }

        /* 종목 헤더 정보 (네이버 금융 스타일) */
        .stock-header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 20px; }
        .stock-title { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .stock-name { font-size: 28px; font-weight: bold; color: #000; margin: 0; }
        .stock-code { font-size: 14px; color: #666; background: #f5f5f5; padding: 4px 10px; border-radius: 4px; }
        .stock-market { font-size: 12px; color: #fff; background: #004ea2; padding: 4px 10px; border-radius: 4px; font-weight: bold; }
        
        /* 현재가 정보 */
        .price-info { display: flex; align-items: baseline; gap: 15px; flex-wrap: wrap; }
        .current-price { font-size: 36px; font-weight: bold; color: #000; }
        .price-change { font-size: 20px; font-weight: bold; }
        .price-change.up { color: #e31b23; }
        .price-change.down { color: #2179f5; }
        .price-change-rate { font-size: 18px; }

        /* 기간 선택 탭 */
        .period-tabs { display: flex; border-bottom: 1px solid #e5e5e5; background: #fafafa; }
        .period-tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 14px; color: #666; background: none; border: none; cursor: pointer; transition: all 0.2s; position: relative; }
        .period-tab:hover { background: #f0f0f0; color: #333; }
        .period-tab.active { color: #e31b23; font-weight: bold; background: #fff; }
        .period-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: #e31b23; }

        /* 차트 컨테이너 */
        .chart-wrapper { padding: 20px; background: #fff; }
        .chart-container { position: relative; height: 400px; width: 100%; }
        .chart-container.small { height: 150px; margin-top: 10px; }

        /* 거래량 레이블 */
        .volume-label { font-size: 13px; color: #666; margin-bottom: 5px; font-weight: 600; }

        /* 기존 스타일 유지 */
        .result-header { text-align: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #e9ecef; margin-top: 10px; }
        .result-header h2 { margin: 0 0 8px 0; color: #004ea2; font-size: 22px; word-break: keep-all; }
        .result-header p { margin: 0; color: #555; font-size: 14px; }
        .market-badge { background-color: #e9ecef; color: #495057; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 8px; display: inline-block; vertical-align: middle; }

        /* 미디어 쿼리 - 모바일 화면 대응 */
        @media (max-width: 480px) {
            h1 { font-size: 18px; }
            .btn-secondary { font-size: 12px; padding: 5px 10px; }
            .table-krds th, .table-krds td { font-size: 13px; padding: 10px 5px; }
            .market-badge { font-size: 10px; padding: 2px 6px; }
            .result-header h2 { font-size: 18px; }
            .date-inputs { flex-direction: column; align-items: stretch; }
            .date-separator { text-align: center; padding: 5px 0; }
            .date-input-wrapper { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>종목 전체 목록</span>
            <a href="{% url 'hts:info_lookup' %}" class="btn-secondary" style="display: inline-block;">뒤로가기</a>
        </h1>

        <!-- 시장 필터 영역 -->
        <div class="date-filter-container" style="margin-bottom: 15px;">
            <span class="date-filter-label">🏷시장 필터</span>
            <div class="date-inputs">
                <select id="market-filter" class="date-input" style="flex: 1; min-width: 150px; cursor: pointer;">
                    <option value="ALL">전체 시장</option>
                    <option value="KR">한국 (KOSPI)</option>
                    <option value="KQ">한국 (KOSDAQ)</option>
                    <option value="US">미국 (다음나스닥/NYSE)</option>
                </select>
                <span id="market-filter-info" style="font-size: 13px; color: #6c757d; padding-top: 10px;">총 <strong id="total-count">0</strong>개 종목</span>
            </div>
        </div>

        <!-- 날짜 선택 영역 -->
        <div class="date-filter-container">
            <span class="date-filter-label">📅 조회 기간 선택</span>
            <div class="date-inputs">
                <div class="date-input-wrapper">
                    <label for="start-date">시작일</label>
                    <input type="date" id="start-date" class="date-input">
                </div>
                <span class="date-separator">~</span>
                <div class="date-input-wrapper">
                    <label for="end-date">종료일</label>
                    <input type="date" id="end-date" class="date-input">
                </div>
            </div>
            <div class="date-presets">
                <button class="preset-btn" onclick="setPresetDate(7)">1주일</button>
                <button class="preset-btn" onclick="setPresetDate(30)">1개월</button>
                <button class="preset-btn" onclick="setPresetDate(90)">3개월</button>
                <button class="preset-btn" onclick="setPresetDate(180)">6개월</button>
                <button class="preset-btn" onclick="setPresetDate(365)">1년</button>
            </div>
        </div>

        <div id="loader" class="loader">데이터를 불러오는 중입니다...</div>

        <!-- 모바일 가로 스크롤을 위한 래퍼 추가 -->
        <div class="table-responsive">
            <table id="stocks-table" class="table-krds">
                <thead>
                    <tr>
                        <th>순번</th>
                        <th>심볼 (Symbol)</th>
                        <th>종목명 (Name)</th>
                        <th>시장 (Market)</th>
                    </tr>
                </thead>
                <tbody id="stocks-tbody">
                </tbody>
            </table>
        </div>

        <div id="empty-msg" class="empty-msg">등록된 주식 종목이 없습니다.</div>

        <!-- Pagination Controls -->
        <div id="pagination-controls" class="pagination">
            <button id="btn-prev" class="btn-secondary" onclick="changePage(-1)">이전</button>
            <span id="page-info" class="page-info">1 / 1</span>
            <button id="btn-next" class="btn-secondary" onclick="changePage(1)">다음</button>
        </div>
    </div>

    <!-- 주가 차트를 보여줄 모달(Modal) - 네이버 금융 스타일 -->
    <div id="chart-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn" onclick="closeModal()">&times;</button>

            <!-- 종목 헤더 정보 -->
            <div class="stock-header">
                <div class="stock-title">
                    <h2 id="modal-name" class="stock-name"></h2>
                    <span id="modal-code" class="stock-code"></span>
                    <span id="modal-market" class="stock-market"></span>
                </div>
                <div class="price-info">
                    <span id="modal-price" class="current-price">-</span>
                    <span id="modal-change" class="price-change">-</span>
                    <span id="modal-change-rate" class="price-change-rate"></span>
                </div>
            </div>

            <!-- 기간 선택 탭 -->
            <div class="period-tabs">
                <button class="period-tab" data-days="1" onclick="setPeriodTab(1)">1일</button>
                <button class="period-tab" data-days="7" onclick="setPeriodTab(7)">1주</button>
                <button class="period-tab active" data-days="30" onclick="setPeriodTab(30)">1개월</button>
                <button class="period-tab" data-days="90" onclick="setPeriodTab(90)">3개월</button>
                <button class="period-tab" data-days="180" onclick="setPeriodTab(180)">6개월</button>
                <button class="period-tab" data-days="365" onclick="setPeriodTab(365)">1년</button>
                <button class="period-tab" data-days="1095" onclick="setPeriodTab(1095)">3년</button>
            </div>

            <!-- 차트 영역 -->
            <div class="chart-wrapper">
                <div id="chart-loader" class="loader">주가 데이터를 불러오는 중입니다...</div>
                
                <!-- 메인 차트 (캔들스틱) -->
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
                
                <!-- 거래량 차트 -->
                <div class="volume-label">거래량</div>
                <div class="chart-container small">
                    <canvas id="volumeChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수
        let allStocks = [];
        let filteredStocks = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        let priceChartInstance = null;
        let currentStock = null;

        // 시장 필터 변경 이벤트
        document.getElementById('market-filter').addEventListener('change', function() {
            filterStocksByMarket(this.value);
        });

        // 시장별 종목 필터링
        function filterStocksByMarket(market) {
            if (market === 'ALL') {
                filteredStocks = [...allStocks];
            } else {
                filteredStocks = allStocks.filter(stock => {
                    const stockMarket = stock.market.toUpperCase();
                    if (market === 'KR') {
                        return stockMarket === 'KR' || stockMarket === 'KOSPI';
                    } else if (market === 'KQ') {
                        return stockMarket === 'KQ' || stockMarket === 'KOSDAQ';
                    } else if (market === 'US') {
                        return stockMarket === 'US' || stockMarket === 'NASDAQ' || stockMarket === 'NYSE' || stockMarket === 'AMEX';
                    }
                    return false;
                });
            }
            currentPage = 1;
            document.getElementById('total-count').textContent = filteredStocks.length;
            renderTable();
        }

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', function() {
            initDefaultDates();
            fetchData();
        });

        // 기본 날짜 설정 (최근 1달, 어제까지)
        function initDefaultDates() {
            const today = new Date();
            const endDate = new Date(today);
            endDate.setDate(endDate.getDate() - 1); // 어제
            
            const startDate = new Date(endDate);
            startDate.setMonth(startDate.getMonth() - 1);

            const endDateStr = endDate.toISOString().split('T')[0];
            const startDateStr = startDate.toISOString().split('T')[0];

            document.getElementById('end-date').value = endDateStr;
            document.getElementById('start-date').value = startDateStr;
        }

        // 프리셋 버튼 클릭 시 날짜 설정 (어제까지)
        function setPresetDate(days) {
            const today = new Date();
            const endDate = new Date(today);
            endDate.setDate(endDate.getDate() - 1); // 어제
            
            const startDate = new Date(endDate);
            startDate.setDate(startDate.getDate() - days + 1);

            document.getElementById('end-date').value = endDate.toISOString().split('T')[0];
            document.getElementById('start-date').value = startDate.toISOString().split('T')[0];
        }

        // 종목 목록 가져오기
        function fetchData() {
            const loader = document.getElementById('loader');
            const emptyMsg = document.getElementById('empty-msg');

            fetch('/api/stocks/')
                .then(response => response.json())
                .then(data => {
                    loader.style.display = 'none';
                    if (data.status === 'success' && data.data && data.data.length > 0) {
                        allStocks = data.data;
                        filteredStocks = [...allStocks];
                        currentPage = 1;
                        document.getElementById('total-count').textContent = filteredStocks.length;
                        renderTable();
                    } else {
                        emptyMsg.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    loader.innerHTML = '데이터를 불러오는 중 오류가 발생했습니다.';
                });
        }

        // 테이블 렌더링
        function renderTable() {
            const table = document.getElementById('stocks-table');
            const tbody = document.getElementById('stocks-tbody');
            const pagination = document.getElementById('pagination-controls');

            tbody.innerHTML = '';

            const totalPages = Math.ceil(filteredStocks.length / itemsPerPage);

            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const currentData = filteredStocks.slice(startIndex, endIndex);

            currentData.forEach((stock, index) => {
                const tr = document.createElement('tr');
                tr.addEventListener('click', () => openModalAndFetchChart(stock));

                const serialNumber = startIndex + index + 1;
                
                // 시장별 배지 클래스 선택
                let marketClass = 'market-badge-default';
                let marketName = stock.market;
                const marketUpper = stock.market.toUpperCase();
                
                if (marketUpper === 'KR' || marketUpper === 'KOSPI') {
                    marketClass = 'market-badge-kospi';
                    marketName = 'KOSPI';
                } else if (marketUpper === 'KQ' || marketUpper === 'KOSDAQ') {
                    marketClass = 'market-badge-kosdaq';
                    marketName = 'KOSDAQ';
                } else if (marketUpper === 'NASDAQ') {
                    marketClass = 'market-badge-nasdaq';
                    marketName = 'NASDAQ';
                } else if (marketUpper === 'US' || marketUpper === 'NYSE' || marketUpper === 'AMEX') {
                    marketClass = 'market-badge-us';
                    marketName = marketUpper === 'US' ? 'US' : marketUpper;
                }

                tr.innerHTML = `
                    <td>${serialNumber}</td>
                    <td>${stock.symbol}</td>
                    <td>${stock.name}</td>
                    <td><span class="${marketClass}" style="padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; white-space: nowrap;">${marketName}</span></td>
                `;
                tbody.appendChild(tr);
            });

            table.classList.add('active');

            if (filteredStocks.length > itemsPerPage) {
                pagination.classList.add('active');
                document.getElementById('page-info').innerText = `${currentPage} / ${totalPages}`;
                document.getElementById('btn-prev').disabled = (currentPage === 1);
                document.getElementById('btn-next').disabled = (currentPage === totalPages);
            } else {
                pagination.classList.remove('active');
            }
        }

        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }

        // 현재 선택된 기간 (일 단위)
        let currentPeriodDays = 30;
        let volumeChartInstance = null;

        // 모달 열기 및 차트 데이터 로드
        function openModalAndFetchChart(stock) {
            currentStock = stock;
            const modal = document.getElementById('chart-modal');

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            // 헤더 정보 세팅
            const marketName = getMarketName(stock.market);
            document.getElementById('modal-market').textContent = marketName;
            document.getElementById('modal-name').textContent = stock.name;
            document.getElementById('modal-code').textContent = stock.symbol;
            
            // 현재가 정보 초기화 (데이터 로드 후 업데이트)
            document.getElementById('modal-price').textContent = '-';
            document.getElementById('modal-change').textContent = '-';
            document.getElementById('modal-change').className = 'price-change';
            document.getElementById('modal-change-rate').textContent = '';

            // 차트 로드
            loadChartData();
        }

        // 시장 이름 변환
        function getMarketName(market) {
            const marketUpper = market.toUpperCase();
            if (marketUpper === 'KR' || marketUpper === 'KOSPI') return 'KOSPI';
            if (marketUpper === 'KQ' || marketUpper === 'KOSDAQ') return 'KOSDAQ';
            if (marketUpper === 'US') return 'NYSE/NASDAQ';
            return market;
        }

        // 기간 탭 선택
        function setPeriodTab(days) {
            currentPeriodDays = days;
            
            // 탭 UI 업데이트
            document.querySelectorAll('.period-tab').forEach(tab => {
                tab.classList.remove('active');
                if (parseInt(tab.dataset.days) === days) {
                    tab.classList.add('active');
                }
            });
            
            loadChartData();
        }

        // 차트 데이터 로드
        function loadChartData() {
            const chartLoader = document.getElementById('chart-loader');
            const priceCanvas = document.getElementById('priceChart');
            const volumeCanvas = document.getElementById('volumeChart');

            // 기간 계산
            const today = new Date();
            const endDate = new Date(today);
            endDate.setDate(endDate.getDate() - 1); // 어제
            const startDate = new Date(endDate);
            startDate.setDate(startDate.getDate() - currentPeriodDays + 1);

            const startDateStr = startDate.toISOString().split('T')[0];
            const endDateStr = endDate.toISOString().split('T')[0];

            // 기존 알림 제거
            const existingNotice = document.querySelector('.missing-data-notice');
            if (existingNotice) existingNotice.remove();

            if (priceChartInstance) {
                priceChartInstance.destroy();
            }
            if (volumeChartInstance) {
                volumeChartInstance.destroy();
            }

            priceCanvas.style.display = 'none';
            volumeCanvas.style.display = 'none';
            chartLoader.style.display = 'block';
            chartLoader.textContent = "주가 데이터를 불러오는 중입니다...";

            // API 호출
            fetch(`/api/prices/symbol/range/?symbol=${encodeURIComponent(currentStock.symbol)}&start_date=${encodeURIComponent(startDateStr)}&end_date=${encodeURIComponent(endDateStr)}`)
                .then(response => response.json())
                .then(data => {
                    if ((data.status === 'success' || data.status === 'partial') && data.data && data.data.length > 0) {
                        chartLoader.style.display = 'none';
                        priceCanvas.style.display = 'block';
                        volumeCanvas.style.display = 'block';
                        
                        const sortedData = data.data.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                        const interval = data.interval || '1d';
                        
                        // 현재가 정보 업데이트 (마지막 데이터 기준)
                        updatePriceInfo(sortedData[sortedData.length - 1]);
                        
                        // 차트 렌더링
                        renderCandlestickChart(sortedData, interval);
                        renderVolumeChart(sortedData, interval);
                        
                        if (data.status === 'partial' && data.missing_data) {
                            const chartWrapper = document.querySelector('.chart-wrapper');
                            const missingNotice = document.createElement('div');
                            missingNotice.className = 'missing-data-notice';
                            missingNotice.style.cssText = 'margin-top: 10px; padding: 10px; background-color: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; font-size: 12px; color: #856404; text-align: center;';
                            missingNotice.innerHTML = `<strong>⚠️ 일부 데이터 누락</strong> - ${data.missing_data.message}`;
                            chartWrapper.appendChild(missingNotice);
                        }
                    } else if (data.status === 'pending') {
                        chartLoader.innerHTML = `
                            <div style="color: #004ea2; font-weight: bold; margin-bottom: 8px;">⏳ 데이터 적재 중</div>
                            <div style="font-size: 13px; color: #666;">${data.message}<br><small>잠시 후 다시 조회해 주세요.</small></div>
                        `;
                    } else if (data.status === 'accepted') {
                        chartLoader.innerHTML = `
                            <div style="color: #28a745; font-weight: bold; margin-bottom: 8px;">✅ 데이터 요청 완료</div>
                            <div style="font-size: 13px; color: #666;">${data.message}<br><small>주가 정보를 가져오는 중입니다. 잠시 후 다시 조회해 주세요.</small></div>
                        `;
                    } else {
                        chartLoader.textContent = "해당 기간의 주가 데이터가 없습니다.";
                    }
                })
                .catch(error => {
                    console.error('Error fetching price data:', error);
                    chartLoader.innerHTML = `
                        <div style="color: #dc3545; font-weight: bold; margin-bottom: 8px;">❌ 오류 발생</div>
                        <div style="font-size: 13px; color: #666;">주가 데이터를 불러오는 중 오류가 발생했습니다.<br><small>나중에 다시 시도해 주세요.</small></div>
                    `;
                });
        }

        // 현재가 정보 업데이트
        function updatePriceInfo(latestData) {
            const currentPrice = latestData.close_price;
            const openPrice = latestData.open_price || currentPrice;
            const change = currentPrice - openPrice;
            const changeRate = openPrice !== 0 ? (change / openPrice) * 100 : 0;
            
            document.getElementById('modal-price').textContent = currentPrice.toLocaleString();
            
            const changeEl = document.getElementById('modal-change');
            const changeRateEl = document.getElementById('modal-change-rate');
            
            const sign = change > 0 ? '+' : (change < 0 ? '' : '');
            changeEl.textContent = `${sign}${change.toLocaleString()}`;
            changeRateEl.textContent = `(${sign}${changeRate.toFixed(2)}%)`;
            
            if (change > 0) {
                changeEl.className = 'price-change up';
                document.getElementById('modal-price').style.color = '#e31b23';
            } else if (change < 0) {
                changeEl.className = 'price-change down';
                document.getElementById('modal-price').style.color = '#2179f5';
            } else {
                changeEl.className = 'price-change';
                document.getElementById('modal-price').style.color = '#000';
            }
        }

        // 모달 닫기
        function closeModal() {
            document.getElementById('chart-modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('chart-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 네이버 금융 스타일 캔들스틱 차트 렌더링
        // DB에 KST로 저장되어 있으므로 별도 변환 불필요
        function renderCandlestickChart(priceData, interval = '1d') {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const dataCount = priceData.length;
            
            // 시작일과 종료일
            const firstDate = new Date(priceData[0].timestamp);
            const lastDate = new Date(priceData[priceData.length - 1].timestamp);
            
            // X축 라벨 포맷 (DB는 KST로 저장됨)
            function formatLabel(timestamp) {
                const date = new Date(timestamp);
                const month = date.getMonth() + 1;
                const day = date.getDate();
                const hours = date.getHours().toString().padStart(2, '0');
                const minutes = date.getMinutes().toString().padStart(2, '0');
                if (interval === '1d') {
                    return `${month}/${day}`;
                } else {
                    return `${month}/${day} ${hours}:${minutes}`;
                }
            }
            
            // 데이터가 많은 경우 압축 (시각적 표시용)
            let displayData = priceData;
            let dataIndices = priceData.map((_, i) => i);
            
            if (dataCount > 150) {
                // 150개로 압축
                const step = Math.ceil(dataCount / 150);
                displayData = [];
                dataIndices = [];
                
                for (let i = 0; i < priceData.length; i += step) {
                    // 구간 내 OHLC 집계
                    const chunk = priceData.slice(i, Math.min(i + step, priceData.length));
                    const aggregated = {
                        timestamp: chunk[0].timestamp,
                        open_price: chunk[0].open_price,
                        high_price: Math.max(...chunk.map(d => d.high_price)),
                        low_price: Math.min(...chunk.map(d => d.low_price)),
                        close_price: chunk[chunk.length - 1].close_price
                    };
                    displayData.push(aggregated);
                    dataIndices.push(i);
                }
                
                // 마지막 데이터 정확히 반영
                if (displayData[displayData.length - 1].timestamp !== priceData[priceData.length - 1].timestamp) {
                    displayData[displayData.length - 1] = {
                        timestamp: priceData[priceData.length - 1].timestamp,
                        open_price: priceData[priceData.length - 1].open_price,
                        high_price: priceData[priceData.length - 1].high_price,
                        low_price: priceData[priceData.length - 1].low_price,
                        close_price: priceData[priceData.length - 1].close_price
                    };
                }
            }
            
            const labels = displayData.map(item => formatLabel(item.timestamp));
            const displayCount = displayData.length;

            // 상승/하띡 색상
            const upColor = '#e31b23';
            const downColor = '#2179f5';
            
            // 차트 플러그인: 캔들스틱 그리기
            const candlestickPlugin = {
                id: 'candlestick',
                beforeDatasetsDraw: (chart) => {
                    const ctx = chart.ctx;
                    const xAxis = chart.scales.x;
                    const yAxis = chart.scales.y;
                    
                    ctx.save();
                    
                    displayData.forEach((item, index) => {
                        const x = xAxis.getPixelForValue(index);
                        const open = yAxis.getPixelForValue(item.open_price);
                        const close = yAxis.getPixelForValue(item.close_price);
                        const high = yAxis.getPixelForValue(item.high_price);
                        const low = yAxis.getPixelForValue(item.low_price);
                        
                        const isUp = item.close_price >= item.open_price;
                        ctx.fillStyle = isUp ? upColor : downColor;
                        ctx.strokeStyle = isUp ? upColor : downColor;
                        ctx.lineWidth = 1;
                        
                        // 캔들 몸통
                        const bodyHeight = Math.abs(close - open);
                        const bodyTop = Math.min(open, close);
                        const candleWidth = Math.max(xAxis.width / displayCount * 0.7, 3);
                        
                        ctx.fillRect(x - candleWidth/2, bodyTop, candleWidth, bodyHeight || 1);
                        
                        // 위아래 꼬리
                        ctx.beginPath();
                        ctx.moveTo(x, high);
                        ctx.lineTo(x, bodyTop);
                        ctx.moveTo(x, bodyTop + bodyHeight);
                        ctx.lineTo(x, low);
                        ctx.stroke();
                    });
                    
                    ctx.restore();
                }
            };

            priceChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '종가',
                        data: displayData.map(item => item.close_price),
                        borderColor: 'transparent',
                        pointRadius: 0,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleFont: { size: 13 },
                            bodyFont: { size: 12 },
                            padding: 10,
                            callbacks: {
                                title: function(context) {
                                    const item = displayData[context[0].dataIndex];
                                    const date = new Date(item.timestamp);
                                    return date.toLocaleString('ko-KR');
                                },
                                label: function(context) {
                                    const item = displayData[context.dataIndex];
                                    const change = item.close_price - item.open_price;
                                    const changeRate = item.open_price !== 0 ? (change / item.open_price * 100).toFixed(2) : 0;
                                    return [
                                        `시가: ${item.open_price?.toLocaleString()}원`,
                                        `고가: ${item.high_price?.toLocaleString()}원`,
                                        `저가: ${item.low_price?.toLocaleString()}원`,
                                        `종가: ${item.close_price?.toLocaleString()}원`,
                                        `등락: ${change > 0 ? '+' : ''}${change.toLocaleString()}원 (${changeRate}%)`
                                    ];
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false, drawBorder: false },
                            ticks: { 
                                font: { size: 11 }, 
                                maxTicksLimit: 8,
                                color: '#666'
                            }
                        },
                        y: {
                            position: 'right',
                            grid: { color: '#f0f0f0' },
                            ticks: {
                                font: { size: 11 },
                                color: '#666',
                                callback: function(value) {
                                    return value.toLocaleString();
                                }
                            }
                        }
                    }
                },
                plugins: [candlestickPlugin]
            });
        }

        // 거래량 차트 렌더링
        // DB에 KST로 저장되어 있으므로 별도 변환 불필요
        function renderVolumeChart(priceData, interval = '1d') {
            const ctx = document.getElementById('volumeChart').getContext('2d');
            const dataCount = priceData.length;
            
            // 메인 차트와 동일한 압축 로직 적용
            let displayData = priceData;
            if (dataCount > 150) {
                const step = Math.ceil(dataCount / 150);
                displayData = [];
                
                for (let i = 0; i < priceData.length; i += step) {
                    const chunk = priceData.slice(i, Math.min(i + step, priceData.length));
                    const aggregated = {
                        timestamp: chunk[0].timestamp,
                        open_price: chunk[0].open_price,
                        close_price: chunk[chunk.length - 1].close_price,
                        volume: chunk.reduce((sum, d) => sum + (d.volume || 0), 0) // 거래량은 합산
                    };
                    displayData.push(aggregated);
                }
                
                // 마지막 데이터
                if (displayData[displayData.length - 1].timestamp !== priceData[priceData.length - 1].timestamp) {
                    displayData[displayData.length - 1] = {
                        timestamp: priceData[priceData.length - 1].timestamp,
                        open_price: priceData[priceData.length - 1].open_price,
                        close_price: priceData[priceData.length - 1].close_price,
                        volume: priceData[priceData.length - 1].volume || 0
                    };
                }
            }
            
            const labels = displayData.map(item => {
                const date = new Date(item.timestamp);
                return `${date.getMonth() + 1}/${date.getDate()}`;
            });
            
            const volumes = displayData.map(item => item.volume || 0);
            
            // 상승/하띡 색상
            const barColors = displayData.map(item => {
                if (item.close_price > item.open_price) return '#e31b23';
                if (item.close_price < item.open_price) return '#2179f5';
                return '#999';
            });

            volumeChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '거래량',
                        data: volumes,
                        backgroundColor: barColors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const value = context.raw;
                                    if (value >= 1000000) {
                                        return `거래량: ${(value / 1000000).toFixed(1)}백만`;
                                    } else if (value >= 1000) {
                                        return `거래량: ${(value / 1000).toFixed(1)}천`;
                                    }
                                    return `거래량: ${value.toLocaleString()}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            display: false,
                            grid: { display: false }
                        },
                        y: {
                            position: 'right',
                            grid: { display: false },
                            ticks: {
                                font: { size: 10 },
                                color: '#999',
                                callback: function(value) {
                                    if (value >= 1000000) return (value / 1000000).toFixed(0) + 'M';
                                    if (value >= 1000) return (value / 1000).toFixed(0) + 'K';
                                    return value;
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
