<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>종목 전체 조회 - HTS</title>
    <!-- Chart.js 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px 10px; }
        .container { width: 100%; max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; overflow: hidden; }
        h1 { margin-top: 0; font-size: 22px; color: #111; letter-spacing: -0.5px; border-bottom: 2px solid #111; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        .btn-secondary { background-color: #fff; color: #495057; border: 1px solid #ced4da; padding: 6px 12px; border-radius: 6px; font-size: 13px; text-decoration: none; transition: all 0.2s; cursor: pointer; white-space: nowrap; }
        .btn-secondary:hover:not(:disabled) { background-color: #f1f3f5; color: #111; }
        .btn-secondary:disabled { background-color: #e9ecef; color: #adb5bd; cursor: not-allowed; border-color: #dee2e6; }
        
        .btn-primary { background-color: #004ea2; color: #fff; border: 1px solid #004ea2; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { background-color: #003a79; }

        /* 날짜 선택 영역 스타일 */
        .date-filter-container {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .date-filter-label {
            font-size: 13px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 10px;
            display: block;
        }
        .date-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .date-input-wrapper {
            flex: 1;
            min-width: 130px;
        }
        .date-input-wrapper label {
            display: block;
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 4px;
        }
        .date-input {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }
        .date-input:focus { border-color: #004ea2; box-shadow: 0 0 0 2px rgba(0, 78, 162, 0.15); }
        .date-separator {
            color: #6c757d;
            font-size: 14px;
            padding: 20px 0 0 0;
        }
        .date-presets {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .preset-btn {
            background-color: #fff;
            color: #495057;
            border: 1px solid #ced4da;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            background-color: #004ea2;
            color: #fff;
            border-color: #004ea2;
        }

        /* 테이블 래퍼 (가로 스크롤 허용) */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 20px; }

        .table-krds { width: 100%; min-width: 400px; border-collapse: collapse; text-align: center; display: none; }
        .table-krds.active { display: table; }
        .table-krds th, .table-krds td { padding: 12px 8px; border-bottom: 1px solid #dee2e6; font-size: 14px; word-break: keep-all; }
        .table-krds th { background-color: #f8f9fa; font-weight: 600; color: #111; border-top: 2px solid #495057; border-bottom: 2px solid #dee2e6; white-space: nowrap; }

        /* 테이블 행 클릭 스타일 적용 */
        .table-krds tbody tr { cursor: pointer; transition: background-color 0.2s; }
        .table-krds tbody tr:hover { background-color: #f1f3f5; }

        /* 열 너비 조절 및 스타일 */
        .table-krds th:first-child, .table-krds td:first-child { width: 15%; color: #6c757d; font-weight: normal; }
        .table-krds td:nth-child(2) { font-weight: 600; color: #111; }

        /* 시장별 배지 스타일 */
        .market-badge-kospi { background-color: #dc3545; color: #fff; }
        .market-badge-kosdaq { background-color: #0066ff; color: #fff; }
        .market-badge-nasdaq { background-color: #6f42c1; color: #fff; }
        .market-badge-us { background-color: #6c757d; color: #fff; }
        .market-badge-default { background-color: #e9ecef; color: #495057; }
        .table-krds td:nth-child(3) { text-align: left; }

        .empty-msg { text-align: center; padding: 40px 20px; color: #777; background: #f8f9fa; border-radius: 8px; border: 1px dashed #ccc; margin-top: 20px; display: none; font-size: 14px; }
        .loader { text-align: center; padding: 30px; color: #666; font-size: 14px; }

        /* Pagination 스타일 */
        .pagination { display: flex; justify-content: center; align-items: center; margin-top: 25px; gap: 10px; display: none; }
        .pagination.active { display: flex; }
        .page-info { font-size: 14px; color: #495057; font-weight: bold; }

        /* 모달 (차트 팝업) 스타일 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #fff; width: 100%; max-width: 800px; max-height: 90vh; border-radius: 12px; padding: 20px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; display: flex; flex-direction: column; overflow-y: auto; }
        .modal-close-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 28px; line-height: 1; cursor: pointer; color: #6c757d; transition: color 0.2s; padding: 0; }
        .modal-close-btn:hover { color: #111; }

        .result-header { text-align: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #e9ecef; margin-top: 10px; }
        .result-header h2 { margin: 0 0 8px 0; color: #004ea2; font-size: 22px; word-break: keep-all; }
        .result-header p { margin: 0; color: #555; font-size: 14px; }
        .market-badge { background-color: #e9ecef; color: #495057; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 8px; display: inline-block; vertical-align: middle; }

        .chart-container { position: relative; flex-grow: 1; min-height: 250px; width: 100%; margin-top: 10px; }

        /* 미디어 쿼리 - 모바일 화면 대응 */
        @media (max-width: 480px) {
            h1 { font-size: 18px; }
            .btn-secondary { font-size: 12px; padding: 5px 10px; }
            .table-krds th, .table-krds td { font-size: 13px; padding: 10px 5px; }
            .market-badge { font-size: 10px; padding: 2px 6px; }
            .result-header h2 { font-size: 18px; }
            .date-inputs { flex-direction: column; align-items: stretch; }
            .date-separator { text-align: center; padding: 5px 0; }
            .date-input-wrapper { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>종목 전체 목록</span>
            <a href="{% url 'hts:info_lookup' %}" class="btn-secondary" style="display: inline-block;">뒤로가기</a>
        </h1>

        <!-- 날짜 선택 영역 -->
        <div class="date-filter-container">
            <span class="date-filter-label">📅 조회 기간 선택</span>
            <div class="date-inputs">
                <div class="date-input-wrapper">
                    <label for="start-date">시작일</label>
                    <input type="date" id="start-date" class="date-input">
                </div>
                <span class="date-separator">~</span>
                <div class="date-input-wrapper">
                    <label for="end-date">종료일</label>
                    <input type="date" id="end-date" class="date-input">
                </div>
            </div>
            <div class="date-presets">
                <button class="preset-btn" onclick="setPresetDate(7)">1주일</button>
                <button class="preset-btn" onclick="setPresetDate(30)">1개월</button>
                <button class="preset-btn" onclick="setPresetDate(90)">3개월</button>
                <button class="preset-btn" onclick="setPresetDate(180)">6개월</button>
                <button class="preset-btn" onclick="setPresetDate(365)">1년</button>
            </div>
        </div>

        <div id="loader" class="loader">데이터를 불러오는 중입니다...</div>

        <!-- 모바일 가로 스크롤을 위한 래퍼 추가 -->
        <div class="table-responsive">
            <table id="stocks-table" class="table-krds">
                <thead>
                    <tr>
                        <th>순번</th>
                        <th>심볼 (Symbol)</th>
                        <th>종목명 (Name)</th>
                        <th>시장 (Market)</th>
                    </tr>
                </thead>
                <tbody id="stocks-tbody">
                </tbody>
            </table>
        </div>

        <div id="empty-msg" class="empty-msg">등록된 주식 종목이 없습니다.</div>

        <!-- Pagination Controls -->
        <div id="pagination-controls" class="pagination">
            <button id="btn-prev" class="btn-secondary" onclick="changePage(-1)">이전</button>
            <span id="page-info" class="page-info">1 / 1</span>
            <button id="btn-next" class="btn-secondary" onclick="changePage(1)">다음</button>
        </div>
    </div>

    <!-- 주가 차트를 보여줄 모달(Modal) -->
    <div id="chart-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn" onclick="closeModal()">&times;</button>

            <div class="result-header">
                <span id="modal-market" class="market-badge"></span>
                <h2 id="modal-name"></h2>
                <p>종목 심볼: <strong id="modal-symbol"></strong></p>
            </div>

            <!-- 모달 내 날짜 선택 -->
            <div style="background-color: #f8f9fa; border-radius: 8px; padding: 12px; margin-bottom: 15px;">
                <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 120px;">
                        <label style="font-size: 11px; color: #6c757d; display: block; margin-bottom: 3px;">시작일</label>
                        <input type="date" id="modal-start-date" class="date-input" style="padding: 8px;">
                    </div>
                    <span style="color: #6c757d; padding-top: 18px;">~</span>
                    <div style="flex: 1; min-width: 120px;">
                        <label style="font-size: 11px; color: #6c757d; display: block; margin-bottom: 3px;">종료일</label>
                        <input type="date" id="modal-end-date" class="date-input" style="padding: 8px;">
                    </div>
                    <button class="btn-primary" onclick="refreshChartWithNewDate()" style="margin-top: 16px; padding: 8px 16px; font-size: 13px;">
                        조회
                    </button>
                </div>
            </div>

            <h3 id="chart-title" style="font-size: 15px; margin-bottom: 10px; text-align: center; color: #333;">주가 추이</h3>
            <div id="chart-loader" class="loader">주가 데이터를 불러오는 중입니다...</div>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수
        let allStocks = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        let priceChartInstance = null;
        let currentStock = null;

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', function() {
            initDefaultDates();
            fetchData();
        });

        // 기본 날짜 설정 (최근 1달, 어제까지)
        function initDefaultDates() {
            const today = new Date();
            const endDate = new Date(today);
            endDate.setDate(endDate.getDate() - 1); // 어제
            
            const startDate = new Date(endDate);
            startDate.setMonth(startDate.getMonth() - 1);

            const endDateStr = endDate.toISOString().split('T')[0];
            const startDateStr = startDate.toISOString().split('T')[0];

            document.getElementById('end-date').value = endDateStr;
            document.getElementById('start-date').value = startDateStr;
        }

        // 프리셋 버튼 클릭 시 날짜 설정 (어제까지)
        function setPresetDate(days) {
            const today = new Date();
            const endDate = new Date(today);
            endDate.setDate(endDate.getDate() - 1); // 어제
            
            const startDate = new Date(endDate);
            startDate.setDate(startDate.getDate() - days + 1);

            document.getElementById('end-date').value = endDate.toISOString().split('T')[0];
            document.getElementById('start-date').value = startDate.toISOString().split('T')[0];
        }

        // 종목 목록 가져오기
        function fetchData() {
            const loader = document.getElementById('loader');
            const emptyMsg = document.getElementById('empty-msg');

            fetch('/api/stocks/')
                .then(response => response.json())
                .then(data => {
                    loader.style.display = 'none';
                    if (data.status === 'success' && data.data && data.data.length > 0) {
                        allStocks = data.data;
                        currentPage = 1;
                        renderTable();
                    } else {
                        emptyMsg.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    loader.innerHTML = '데이터를 불러오는 중 오류가 발생했습니다.';
                });
        }

        // 테이블 렌더링
        function renderTable() {
            const table = document.getElementById('stocks-table');
            const tbody = document.getElementById('stocks-tbody');
            const pagination = document.getElementById('pagination-controls');

            tbody.innerHTML = '';

            const totalPages = Math.ceil(allStocks.length / itemsPerPage);

            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const currentData = allStocks.slice(startIndex, endIndex);

            currentData.forEach((stock, index) => {
                const tr = document.createElement('tr');
                tr.addEventListener('click', () => openModalAndFetchChart(stock));

                const serialNumber = startIndex + index + 1;
                
                // 시장별 배지 클래스 선택
                let marketClass = 'market-badge-default';
                let marketName = stock.market;
                const marketUpper = stock.market.toUpperCase();
                
                if (marketUpper === 'KR' || marketUpper === 'KOSPI') {
                    marketClass = 'market-badge-kospi';
                    marketName = 'KOSPI';
                } else if (marketUpper === 'KQ' || marketUpper === 'KOSDAQ') {
                    marketClass = 'market-badge-kosdaq';
                    marketName = 'KOSDAQ';
                } else if (marketUpper === 'NASDAQ') {
                    marketClass = 'market-badge-nasdaq';
                    marketName = 'NASDAQ';
                } else if (marketUpper === 'US' || marketUpper === 'NYSE' || marketUpper === 'AMEX') {
                    marketClass = 'market-badge-us';
                    marketName = marketUpper === 'US' ? 'US' : marketUpper;
                }

                tr.innerHTML = `
                    <td>${serialNumber}</td>
                    <td>${stock.symbol}</td>
                    <td>${stock.name}</td>
                    <td><span class="${marketClass}" style="padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; white-space: nowrap;">${marketName}</span></td>
                `;
                tbody.appendChild(tr);
            });

            table.classList.add('active');

            if (allStocks.length > itemsPerPage) {
                pagination.classList.add('active');
                document.getElementById('page-info').innerText = `${currentPage} / ${totalPages}`;
                document.getElementById('btn-prev').disabled = (currentPage === 1);
                document.getElementById('btn-next').disabled = (currentPage === totalPages);
            } else {
                pagination.classList.remove('active');
            }
        }

        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }

        // 모달 열기 및 차트 데이터 로드
        function openModalAndFetchChart(stock) {
            currentStock = stock;
            const modal = document.getElementById('chart-modal');

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            // 헤더 정보 세팅
            document.getElementById('modal-market').textContent = stock.market;
            document.getElementById('modal-name').textContent = stock.name;
            document.getElementById('modal-symbol').textContent = stock.symbol;

            // 모달 날짜 입력에 현재 선택된 날짜 설정
            document.getElementById('modal-start-date').value = document.getElementById('start-date').value;
            document.getElementById('modal-end-date').value = document.getElementById('end-date').value;

            // 차트 로드
            loadChartData();
        }

        // 차트 데이터 로드
        function loadChartData() {
            const chartLoader = document.getElementById('chart-loader');
            const canvasElement = document.getElementById('priceChart');
            const startDateStr = document.getElementById('modal-start-date').value;
            const endDateStr = document.getElementById('modal-end-date').value;

            // 기존 알림 제거
            const existingNotice = document.querySelector('.missing-data-notice');
            if (existingNotice) existingNotice.remove();

            if (priceChartInstance) {
                priceChartInstance.destroy();
            }

            canvasElement.style.display = 'none';
            chartLoader.style.display = 'block';
            chartLoader.textContent = "주가 데이터를 불러오는 중입니다...";

            // 차트 제목 업데이트
            const start = new Date(startDateStr);
            const end = new Date(endDateStr);
            const diffDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
            document.getElementById('chart-title').textContent = `${startDateStr} ~ ${endDateStr} (${diffDays}일)`;

            // API 호출
            fetch(`/api/prices/symbol/range/?symbol=${encodeURIComponent(currentStock.symbol)}&start_date=${encodeURIComponent(startDateStr)}&end_date=${encodeURIComponent(endDateStr)}`)
                .then(response => response.json())
                .then(data => {
                    if ((data.status === 'success' || data.status === 'partial') && data.data && data.data.length > 0) {
                        chartLoader.style.display = 'none';
                        canvasElement.style.display = 'block';
                        const sortedData = data.data.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                        renderChart(sortedData, currentStock.name);
                        
                        if (data.status === 'partial' && data.missing_data) {
                            const modalContent = document.querySelector('.modal-content');
                            const missingNotice = document.createElement('div');
                            missingNotice.className = 'missing-data-notice';
                            missingNotice.style.cssText = 'margin-top: 10px; padding: 10px; background-color: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; font-size: 12px; color: #856404; text-align: center;';
                            missingNotice.innerHTML = `<strong>⚠️ 일부 데이터 누락</strong> - ${data.missing_data.message}`;
                            modalContent.appendChild(missingNotice);
                        }
                    } else if (data.status === 'pending') {
                        canvasElement.style.display = 'none';
                        chartLoader.style.display = 'block';
                        chartLoader.innerHTML = `
                            <div style="color: #004ea2; font-weight: bold; margin-bottom: 8px;">⏳ 데이터 적재 중</div>
                            <div style="font-size: 13px; color: #666;">${data.message}<br><small>잠시 후 다시 조회해 주세요.</small></div>
                        `;
                    } else if (data.status === 'accepted') {
                        canvasElement.style.display = 'none';
                        chartLoader.style.display = 'block';
                        chartLoader.innerHTML = `
                            <div style="color: #28a745; font-weight: bold; margin-bottom: 8px;">✅ 데이터 요청 완료</div>
                            <div style="font-size: 13px; color: #666;">${data.message}<br><small>주가 정보를 가져오는 중입니다. 잠시 후 다시 조회해 주세요.</small></div>
                        `;
                    } else {
                        renderChart([], currentStock.name);
                        chartLoader.style.display = 'block';
                        chartLoader.textContent = "해당 기간의 주가 데이터가 없습니다.";
                    }
                })
                .catch(error => {
                    console.error('Error fetching price data:', error);
                    canvasElement.style.display = 'none';
                    chartLoader.style.display = 'block';
                    chartLoader.innerHTML = `
                        <div style="color: #dc3545; font-weight: bold; margin-bottom: 8px;">❌ 오류 발생</div>
                        <div style="font-size: 13px; color: #666;">주가 데이터를 불러오는 중 오류가 발생했습니다.<br><small>나중에 다시 시도해 주세요.</small></div>
                    `;
                });
        }

        // 모달에서 날짜 변경 후 다시 조회
        function refreshChartWithNewDate() {
            const modalStartDate = document.getElementById('modal-start-date').value;
            const modalEndDate = document.getElementById('modal-end-date').value;

            if (!modalStartDate || !modalEndDate) {
                alert('시작일과 종료일을 모두 선택해주세요.');
                return;
            }

            if (new Date(modalStartDate) > new Date(modalEndDate)) {
                alert('시작일은 종료일보다 이전이어야 합니다.');
                return;
            }

            // 메인 페이지의 날짜도 동기화
            document.getElementById('start-date').value = modalStartDate;
            document.getElementById('end-date').value = modalEndDate;

            loadChartData();
        }

        function closeModal() {
            document.getElementById('chart-modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('chart-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        function renderChart(priceData, stockName) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            const labels = priceData.map(item => {
                const date = new Date(item.timestamp);
                return `${date.getMonth() + 1}/${date.getDate()}`;
            });

            const colors = priceData.map(item => {
                return item.close_price >= item.open_price ? 'rgba(239, 68, 68, 0.8)' : 'rgba(59, 130, 246, 0.8)';
            });

            const barData = priceData.map(item => {
                const low = item.low_price !== null ? item.low_price : item.close_price;
                const high = item.high_price !== null ? item.high_price : item.close_price;
                return [low, high];
            });

            const closePrices = priceData.map(item => item.close_price);

            priceChartInstance = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: 'bar',
                            label: '최저가 ~ 최고가',
                            data: barData,
                            backgroundColor: colors,
                            borderColor: colors,
                            borderWidth: 1,
                            barPercentage: 0.6,
                            categoryPercentage: 0.8
                        },
                        {
                            type: 'line',
                            label: '종가 (Close Price)',
                            data: closePrices,
                            borderColor: '#343a40',
                            borderWidth: 2,
                            pointRadius: 2,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#343a40',
                            fill: false,
                            tension: 0.1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'bottom',
                            labels: {
                                boxWidth: 12,
                                font: { size: 11 }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    if (context.datasetIndex === 0) {
                                        const low = context.raw[0].toLocaleString();
                                        const high = context.raw[1].toLocaleString();
                                        return `범위: ${low} ~ ${high}원`;
                                    }
                                    return `종가: ${context.raw.toLocaleString()}원`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { font: { size: 10 }, maxTicksLimit: 8 }
                        },
                        y: {
                            beginAtZero: false,
                            ticks: {
                                font: { size: 10 },
                                callback: function(value) {
                                    return value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
