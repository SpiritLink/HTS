<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보 조회 - HTS</title>
    <style>
        body { font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; text-align: center; }
        h1 { margin-top: 0; font-size: 26px; color: #111; letter-spacing: -0.5px; border-bottom: 2px solid #111; padding-bottom: 20px; margin-bottom: 30px; }

        .btn-group { display: flex; flex-direction: column; gap: 16px; max-width: 300px; margin: 0 auto; }
        .btn { padding: 16px 24px; border-radius: 6px; font-size: 16px; font-weight: bold; text-decoration: none; box-sizing: border-box; transition: all 0.2s; cursor: pointer; text-align: center; display: block; }
        .btn-primary { background-color: #004ea2; color: #fff; border: 1px solid #004ea2; }
        .btn-primary:hover { background-color: #003a79; border-color: #003a79; }

        .btn-info { background-color: #28a745; color: #fff; border: 1px solid #28a745; }
        .btn-info:hover { background-color: #218838; border-color: #1e7e34; }

        .btn-secondary { background-color: #fff; color: #495057; border: 1px solid #ced4da; margin-top: 20px;}
        .btn-secondary:hover { background-color: #f1f3f5; color: #111; }

    </style>
</head>
<body>
    <div class="container">
        <h1>정보 조회 메뉴</h1>

        <div class="btn-group">
            <a href="{% url 'hts:stock_list' %}" class="btn btn-primary">종목 전체 목록 조회</a>
            <a href="{% url 'hts:stock_search_page' %}" class="btn btn-info">주식 이름으로 검색</a>
            <a href="{% url 'hts:index' %}" class="btn btn-secondary">메인으로 돌아가기</a>
        </div>
    </div>
</body>
</html>
