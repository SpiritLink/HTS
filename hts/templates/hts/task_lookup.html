<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작업 조회 - HTS</title>
    <style>
        body { 
            font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif; 
            background-color: #f4f6f9; 
            color: #333; 
            margin: 0; 
            padding: 40px 20px; 
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: #fff; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            box-sizing: border-box; 
            text-align: center; 
        }
        h1 { 
            margin-top: 0; 
            font-size: 26px; 
            color: #111; 
            letter-spacing: -0.5px; 
            border-bottom: 2px solid #111; 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
        }

        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            max-width: 400px; 
            margin: 0 auto 30px; 
        }
        .btn { 
            padding: 16px 24px; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold; 
            text-decoration: none; 
            box-sizing: border-box; 
            transition: all 0.2s; 
            cursor: pointer; 
            text-align: center; 
            display: block; 
            border: none;
        }
        .btn-primary { 
            background-color: #6f42c1; 
            color: #fff; 
        }
        .btn-primary:hover { 
            background-color: #5a32a3; 
        }
        .btn-secondary { 
            background-color: #fff; 
            color: #495057; 
            border: 1px solid #ced4da; 
        }
        .btn-secondary:hover { 
            background-color: #f1f3f5; 
            color: #111; 
        }

        /* 상태 배지 스타일 */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending { background-color: #ffc107; color: #000; }
        .status-processing { background-color: #17a2b8; color: #fff; }
        .status-completed { background-color: #28a745; color: #fff; }
        .status-failed { background-color: #dc3545; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>작업 조회 메뉴</h1>

        <div class="btn-group">
            <a href="{% url 'hts:task_queue_list' %}" class="btn btn-primary">가격 조회 큐 조회</a>
            <a href="{% url 'hts:index' %}" class="btn btn-secondary">메인으로 돌아가기</a>
        </div>

        <div style="margin-top: 30px; padding: 20px; background-color: #f8f9fa; border-radius: 8px; text-align: left;">
            <h3 style="margin-top: 0; color: #495057; font-size: 16px;">탐색 안내</h3>
            <ul style="color: #666; font-size: 14px; line-height: 1.8; margin: 0; padding-left: 20px;">
                <li><strong>가격 조회 큐 조회</strong>: Yahoo Finance에서 주가 데이터를 가져오기 위한 요청 큐의 상태를 확인할 수 있습니다.</li>
                <li>요청의 상태는 PENDING(대기중), PROCESSING(처리중), COMPLETED(완룻), FAILED(실패)로 구분됩니다.</li>
                <li>페이지당 10개의 요청을 보여줌니다.</li>
            </ul>
        </div>
    </div>
</body>
</html>
