<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기타 메뉴 - 주식 거래 시스템 (HTS)</title>
    <style>
        /* 디지털 정부서비스 UI/UX 가이드라인 기반 스타일 */
        body { font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .main-container { background: #fff; padding: 50px 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 500px; box-sizing: border-box; text-align: center; }
        h1 { margin-top: 0; font-size: 28px; color: #111; margin-bottom: 16px; letter-spacing: -0.5px; }
        p.description { font-size: 16px; color: #555; margin-bottom: 40px; line-height: 1.5; }

        /* 넉넉한 터치 영역과 고대비 색상을 적용한 버튼 그룹 */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { display: block; width: 100%; padding: 16px; border-radius: 6px; font-size: 16px; font-weight: bold; text-decoration: none; box-sizing: border-box; transition: all 0.2s; }

        /* 정부서비스 표준 강조 색상 */
        .btn-primary { background-color: #004ea2; color: #fff; border: 1px solid #004ea2; }
        .btn-primary:hover { background-color: #003a79; border-color: #003a79; }

        .btn-outline { background-color: #fff; color: #004ea2; border: 1px solid #004ea2; }
        .btn-outline:hover { background-color: #f1f6fa; }

        .btn-info { background-color: #28a745; color: #fff; border: 1px solid #28a745; }
        .btn-info:hover { background-color: #218838; border-color: #1e7e34; }

        .btn-dark { background-color: #343a40; color: #fff; border: 1px solid #343a40; }
        .btn-dark:hover { background-color: #23272b; border-color: #1d2124; }

        .btn-secondary { background-color: #6c757d; color: #fff; border: 1px solid #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; border-color: #545b62; }
    </style>
</head>
<body>
    <main class="main-container">
        <h1>기타 메뉴</h1>
        <p class="description">추가적인 시스템 관리 및 개발 도구 메뉴입니다.</p>

        <div class="btn-group">
            <a href="{% url 'hts:task_lookup' %}" class="btn btn-info" style="background-color: #6f42c1; border-color: #6f42c1;">서버 작업 조회</a>
            <a href="{% url 'hts:dev_guide' %}" class="btn btn-dark">개발자 가이드 (API 문서)</a>
            <a href="/admin/" class="btn btn-outline">시스템 관리자(Admin) 페이지</a>
            <hr style="border: 0; border-top: 1px solid #e9ecef; margin: 15px 0;">
            <a href="{% url 'hts:index' %}" class="btn btn-secondary">이전 화면으로 (메인)</a>
        </div>
    </main>
</body>
</html>
